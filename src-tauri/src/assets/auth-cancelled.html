<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Friendolls Sign-in Cancelled</title>
    <style>
      :root {
        color-scheme: light;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background:
          radial-gradient(circle at top, #fff0cf, transparent 45%),
          linear-gradient(180deg, #fffdf7 0%, #f8f2e6 100%);
        font-family: "Avenir Next", "Segoe UI", sans-serif;
        color: #55411d;
      }

      .card {
        width: min(420px, calc(100vw - 32px));
        padding: 32px 28px;
        border-radius: 24px;
        background: rgba(255, 255, 255, 0.92);
        box-shadow: 0 24px 80px rgba(120, 95, 35, 0.14);
        text-align: center;
      }

      h1 {
        margin: 0 0 10px;
        font-size: 28px;
      }

      p {
        margin: 0;
        line-height: 1.5;
        color: #7a6237;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>Sign-in cancelled</h1>
      <p>You can close this tab and return to Friendolls to try again.</p>
    </div>
  </body>
</html>
