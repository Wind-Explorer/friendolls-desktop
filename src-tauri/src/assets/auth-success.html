<!doctype html>
<html>
  <head>
    <title>Authentication Successful</title>
    <style>
      body {
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        margin: 0;
      }
      .container {
        text-align: center;
        max-width: 330px;
      }
      h1 {
        color: #2d3748;
        margin-bottom: 1rem;
      }
      p {
        color: #718096;
        line-height: 1.6;
      }
      .checkmark {
        font-size: 4rem;
        color: #48bb78;
        margin-bottom: 1rem;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="checkmark">✓</div>
      <h1>Signed in!</h1>
      <p>You have been successfully authenticated.</p>
      <p>You may now close this window and return to the application.</p>
    </div>
  </body>
</html>
