<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Friendolls Sign-in Complete</title>
    <style>
      :root {
        color-scheme: light;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background:
          radial-gradient(circle at top, #d8f8ff, transparent 45%),
          linear-gradient(180deg, #f8feff 0%, #eef8fb 100%);
        font-family: "Avenir Next", "Segoe UI", sans-serif;
        color: #24414b;
      }

      .card {
        width: min(420px, calc(100vw - 32px));
        padding: 32px 28px;
        border-radius: 24px;
        background: rgba(255, 255, 255, 0.9);
        box-shadow: 0 24px 80px rgba(55, 113, 130, 0.18);
        text-align: center;
      }

      h1 {
        margin: 0 0 10px;
        font-size: 28px;
      }

      p {
        margin: 0;
        line-height: 1.5;
        color: #4b6973;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>Signed in</h1>
      <p>You can close this browser tab and return to Friendolls.</p>
    </div>
  </body>
</html>
