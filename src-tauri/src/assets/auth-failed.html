<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Friendolls Sign-in Failed</title>
    <style>
      :root {
        color-scheme: light;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background:
          radial-gradient(circle at top, #ffd8d8, transparent 45%),
          linear-gradient(180deg, #fff8f8 0%, #fceeee 100%);
        font-family: "Avenir Next", "Segoe UI", sans-serif;
        color: #4d2323;
      }

      .card {
        width: min(420px, calc(100vw - 32px));
        padding: 32px 28px;
        border-radius: 24px;
        background: rgba(255, 255, 255, 0.92);
        box-shadow: 0 24px 80px rgba(135, 57, 57, 0.14);
        text-align: center;
      }

      h1 {
        margin: 0 0 10px;
        font-size: 28px;
      }

      p {
        margin: 0;
        line-height: 1.5;
        color: #7c4a4a;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>Sign-in failed</h1>
      <p>Friendolls could not complete the browser handshake. Return to the app and try again.</p>
    </div>
  </body>
</html>
